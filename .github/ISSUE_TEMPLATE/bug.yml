name: Bug Report
description: Something is not working correctly
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Before submitting, please run `fw doctor --collect` and attach the generated `flutterwrapper-report.zip`.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `fw ...`
        2. Open Android Studio ...
        3. See error
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `fw doctor --json`
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant lines from `logs/flutter.log` or `logs/bridge.log`
  - type: input
    id: version
    attributes:
      label: FlutterWrapper version
      description: Output of `fw version`
