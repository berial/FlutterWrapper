name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create release archive
        run: |
          VERSION=$(cat VERSION)
          mkdir -p dist/FlutterWrapper-${VERSION}
          cp -r bin lib tools docs install.ps1 VERSION LICENSE config.example.yaml dist/FlutterWrapper-${VERSION}/
          cd dist && zip -r FlutterWrapper-${VERSION}.zip FlutterWrapper-${VERSION}/
          echo "ARCHIVE=dist/FlutterWrapper-${VERSION}.zip" >> $GITHUB_ENV
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            ${{ env.ARCHIVE }} \
            --title "FlutterWrapper ${{ github.ref_name }}" \
            --generate-notes
