name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]

jobs:
  lint-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: PowerShell syntax check
        run: |
          $scripts = Get-ChildItem -Recurse -Include *.ps1 -Path bin,lib,install.ps1 | Where-Object { $_.Name -ne 'daemon-direct-test.ps1' }
          $errors = 0
          foreach ($s in $scripts) {
            $tokens = $null; $errs = $null
            $ast = [System.Management.Automation.Language.Parser]::ParseFile($s.FullName, [ref]$tokens, [ref]$errs)
            if ($errs.Count -gt 0) {
              Write-Host "ERROR: $($s.Name)"
              foreach ($e in $errs) { Write-Host "  $($e.Message)" }
              $errors++
            } else {
              Write-Host "OK: $($s.Name)"
            }
          }
          if ($errors -gt 0) { exit 1 }

  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: ShellCheck
        run: |
          sh_files=$(find tools -name '*.sh' 2>/dev/null || true)
          if [ -n "$sh_files" ]; then
            shellcheck --severity=error $sh_files
            echo "ShellCheck done"
          else
            echo "No shell scripts to check"
          fi

  smoke-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Smoke test (config parse + fw version)
        run: |
          $ErrorActionPreference = 'Stop'
          . "$env:GITHUB_WORKSPACE\lib\config.ps1"
          $v = Get-WrapperVersion $env:GITHUB_WORKSPACE
          Write-Host "Version: $v"
          if (-not $v) { exit 1 }
          # Verify config.example.yaml parses
          $cfg = Read-WrapperConfigSafe "$env:GITHUB_WORKSPACE\config.example.yaml"
          if (-not $cfg) { throw 'config.example.yaml failed to parse' }
          Write-Host "Config parse OK, distro=$($cfg.wsl.distro)"

  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify VERSION file
        run: |
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file missing"
            exit 1
          fi
          echo "VERSION: $(cat VERSION)"
